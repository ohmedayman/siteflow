<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Flow - No-Code Website Builder</title>
<meta name="description" content="Build stunning websites without code. Drag-and-drop builder, SEO optimized, responsive design.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="logo" onclick="Router.navigate('')">
        <img src="assets/sitflow.svg" alt="Site Flow" width="28" height="28" style="filter:hue-rotate(0deg)">
        Site<span>Flow</span>
      </a>
      <nav class="nav-links">
        <a href="#/plans" class="btn btn-ghost btn-sm">Pricing</a>
        <a href="#/help" class="btn btn-ghost btn-sm">Help</a>
        <a href="#/about" class="btn btn-ghost btn-sm">About</a>
        <a href="#/dashboard" class="btn btn-ghost btn-sm js-auth-user hidden">My Sites</a>
        <a href="#/settings" class="btn btn-ghost btn-sm js-auth-user hidden">Settings</a>
        <a href="#/login" class="btn btn-primary btn-sm js-auth-guest">Get Started</a>
        <button class="btn btn-ghost btn-sm js-auth-user hidden" onclick="Auth.logout()">Logout</button>
      </nav>
    </div>
  </header>
  <main class="app-main" id="app"></main>
  <script src="js/presets.js?v=3"></script>
  <script src="js/storage.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/templates.js?v=3"></script>
  <script src="js/builder.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
