# Site Flow — Nginx config
# Domain: siteflow.vexonet.online
# Wildcard: *.siteflow.vexonet.online (user sites)

# HTTP → HTTPS redirect (including wildcard)
server {
    listen 80;
    server_name siteflow.vexonet.online *.siteflow.vexonet.online;
    return 301 https://$host$request_uri;
}

# Main domain HTTPS — SPA + /api + /admin
server {
    listen 443 ssl http2;
    server_name siteflow.vexonet.online;

    ssl_certificate     /etc/ssl/certs/siteflow.vexonet.online.crt;
    ssl_certificate_key /etc/ssl/private/siteflow.vexonet.online.key;

    root /var/www/siteflow;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard subdomains — all to Flask (before_request handles routing)
server {
    listen 443 ssl http2;
    server_name *.siteflow.vexonet.online;

    ssl_certificate     /etc/ssl/certs/siteflow.vexonet.online.crt;
    ssl_certificate_key /etc/ssl/private/siteflow.vexonet.online.key;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
