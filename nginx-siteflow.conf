# Site Flow — Nginx config (dynamic domain)
# Replace YOUR_DOMAIN with your actual domain (e.g. siteflow.app or siteflow.vexonet.online)
# Wildcard: *.YOUR_DOMAIN (serves user sites via Flask)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN *.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# Main domain HTTPS — serves SPA + proxies /api to Flask
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/ssl/certs/YOUR_DOMAIN.crt;
    ssl_certificate_key /etc/ssl/private/YOUR_DOMAIN.key;

    root /var/www/siteflow;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard subdomains HTTPS — all to Flask (before_request handles)
server {
    listen 443 ssl http2;
    server_name *.YOUR_DOMAIN;

    ssl_certificate     /etc/ssl/certs/YOUR_DOMAIN.crt;
    ssl_certificate_key /etc/ssl/private/YOUR_DOMAIN.key;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
