# Site Flow — Nginx config
# Main domain: siteflow.vexonet.online (serves SPA)
# Wildcard: *.siteflow.vexonet.online (serves user sites via Flask)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name siteflow.vexonet.online *.siteflow.vexonet.online;
    return 301 https://$host$request_uri;
}

# Main domain HTTPS — serves SPA + proxies /api to Flask
server {
    listen 443 ssl http2;
    server_name siteflow.vexonet.online;

    ssl_certificate     /etc/ssl/certs/siteflow.crt;
    ssl_certificate_key /etc/ssl/private/siteflow.key;

    root /var/www/siteflow;
    index index.html;

    # SPA — serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → Flask backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin
    location /admin {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard subdomains HTTPS — ALL requests go to Flask (handled by before_request)
server {
    listen 443 ssl http2;
    server_name *.siteflow.vexonet.online;

    ssl_certificate     /etc/ssl/certs/siteflow.crt;
    ssl_certificate_key /etc/ssl/private/siteflow.key;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
